name: OnePlus7TPro 内核编译 | AOSP Clang21.0.0
on:
  workflow_dispatch:
    inputs:
      clean_build:
        description: "是否全新编译（清空所有缓存）"
        required: false
        default: false
        type: boolean
      debug_mode:
        description: "是否开启调试模式（保留完整编译日志）"
        required: false
        default: true
        type: boolean

env:
  # ========== 核心固定配置（适配你的OnePlus7T Pro） ==========
  DEVICE_CODENAME: hotdog
  DEVICE_NAME: OnePlus7TPro
  ARCH: arm64
  # 编译器配置（彻底解决404问题，Clang地址完全保留你指定的版本）
  CLANG_VERSION: clang-r563880c
  # 主下载地址：你指定的NDK r29地址，完全不变
  CLANG_URL: https://dl.google.com/android/repository/android-ndk-r29-linux.zip
  # 备用镜像地址（GitHub官方源，主链接失败时自动兜底）
  CLANG_MIRROR_URL: https://github.com/android/ndk/releases/download/r29/android-ndk-r29-linux-x86_64.zip
  # ========== 修复：GCC工具链正确地址（LineageOS官方镜像，长期维护稳定可用） ==========
  # ARM64 GCC 4.9 工具链（AOSP同源，适配Android内核编译）
  GCC_ARM64_REPO: https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_aarch64_aarch64-linux-android-4.9.git
  GCC_ARM64_TAR_URL: https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_aarch64_aarch64-linux-android-4.9/archive/refs/heads/lineage-18.1.tar.gz
  # ARM32 GCC 4.9 工具链（32位兼容库编译必备）
  GCC_ARM32_REPO: https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_arm_arm-linux-androideabi-4.9.git
  GCC_ARM32_TAR_URL: https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_arm_arm-linux-androideabi-4.9/archive/refs/heads/lineage-18.1.tar.gz
  # 目录配置
  WORKSPACE: ${{ github.workspace }}/kernel_workspace
  CLANG_DIR: ${{ github.workspace }}/kernel_workspace/clang-aosp
  GCC_ARM64_DIR: ${{ github.workspace }}/kernel_workspace/gcc-arm64
  GCC_ARM32_DIR: ${{ github.workspace }}/kernel_workspace/gcc-arm32
  KERNEL_DIR: ${{ github.workspace }}/kernel_workspace/android-kernel
  # 内核优化开关（完全匹配你的内核特征）
  ENABLE_LTO: true
  ENABLE_PGO: false
  ENABLE_MLGO: false
  PGO_PROFDATA_PATH: ${{ github.workspace }}/kernel_pgo.profdata
  # ========== 可配置项（从config.env读取，无需修改此处） ==========

jobs:
  build:
    name: 内核编译构建
    runs-on: ubuntu-22.04
    if: github.event.repository.owner.id == github.event.sender.id
    
    steps:
    - name: 1. 拉取仓库配置
      uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: 2. 导入config.env配置
      run: |
        set -euo pipefail
        # 导入用户自定义配置
        grep -E '^(KERNEL_SOURCE|KERNEL_SOURCE_BRANCH|KERNEL_CONFIG|KERNEL_ZIP_NAME|LLVM_CONFIG|KERNEL_IMAGE_NAME|NEED_DTBO|SWITCH_PYTHON|ENABLE_KVM|ENABLE_LXC_DOCKER|ENABLE_KERNELSU|KERNELSU_TAG)=' config.env >> $GITHUB_ENV
        # 固定设备配置
        echo "DEVICE_CODENAME=${{ env.DEVICE_CODENAME }}" >> $GITHUB_ENV
        echo "ARCH=${{ env.ARCH }}" >> $GITHUB_ENV

    - name: 3. 安装编译依赖环境
      run: |
        set -euo pipefail
        # 启用universe仓库，兼容Python2.7
        sudo add-apt-repository universe -y
        sudo apt-get update -y
        # 安装全量依赖，适配AOSP Clang21与4.14内核
        sudo -E apt-get -y -qq install --no-install-recommends \
          git make bc bison ccache openssl zip kmod cpio flex libelf-dev \
          curl libssl-dev libtfm-dev wget device-tree-compiler ca-certificates \
          python3 python2.7 binutils binutils-aarch64-linux-gnu binutils-arm-linux-gnueabi \
          software-properties-common libncurses5-dev libtinfo5 unzip tar
        mkdir -p ${{ env.WORKSPACE }} ${{ env.CLANG_DIR }} ${{ env.GCC_ARM64_DIR }} ${{ env.GCC_ARM32_DIR }}

    - name: 4. 切换Python2.7（适配4.14内核）
      if: env.SWITCH_PYTHON == 'true'
      run: |
        set -euo pipefail
        sudo rm -f /usr/bin/python
        sudo ln -s /usr/bin/python2.7 /usr/bin/python
        python --version

    - name: 5. 缓存AOSP编译工具链
      id: toolchain-cache
      uses: actions/cache@v4
      with:
        path: |
          ${{ env.CLANG_DIR }}
          ${{ env.GCC_ARM64_DIR }}
          ${{ env.GCC_ARM32_DIR }}
        key: ${{ env.CLANG_VERSION }}-aarch64-gcc4.9-arm32-gcc4.9-git-fix
        restore-keys: |
          ${{ env.CLANG_VERSION }}-

    - name: 6. 下载AOSP Clang21.0.0 全LLVM工具链 + GCC兼容工具链（修复解析失败问题）
      if: steps.toolchain-cache.outputs.cache-hit != 'true' || inputs.clean_build == true
      run: |
        set -euo pipefail
        # 1. 下载Clang21.0.0(NDK r29)，主链接为你指定的地址，失败自动切换备用镜像
        echo "正在下载AOSP Clang ${{ env.CLANG_VERSION }}..."
        if ! wget --retry-connrefused --tries=5 --waitretry=3 ${{ env.CLANG_URL }} -O ndk-clang.zip; then
          echo "主链接下载失败，切换备用GitHub镜像..."
          wget --retry-connrefused --tries=5 --waitretry=3 ${{ env.CLANG_MIRROR_URL }} -O ndk-clang.zip
        fi
        # 解压并提取Clang工具链
        unzip -q ndk-clang.zip -d ndk-temp
        mv ndk-temp/android-ndk-r29/toolchains/llvm/prebuilt/linux-x86_64/* ${{ env.CLANG_DIR }}
        rm -rf ndk-temp ndk-clang.zip

        # 2. 下载ARM64 GCC 4.9兼容工具链（优先git克隆，失败自动切换tar.gz直下兜底）
        echo "正在获取ARM64 GCC 4.9兼容工具链..."
        if ! git clone ${{ env.GCC_ARM64_REPO }} ${{ env.GCC_ARM64_DIR }} --depth=1; then
          echo "Git克隆失败，切换tar.gz压缩包直下模式..."
          wget --retry-connrefused --tries=5 --waitretry=3 ${{ env.GCC_ARM64_TAR_URL }} -O gcc-arm64.tar.gz
          mkdir -p gcc-arm64-temp
          tar -zxf gcc-arm64.tar.gz -C gcc-arm64-temp --strip-components=1
          mv gcc-arm64-temp/* ${{ env.GCC_ARM64_DIR }}
          rm -rf gcc-arm64-temp gcc-arm64.tar.gz
        fi

        # 3. 下载ARM32 GCC 4.9兼容工具链（同样双方案兜底）
        echo "正在获取ARM32 GCC 4.9兼容工具链..."
        if ! git clone ${{ env.GCC_ARM32_REPO }} ${{ env.GCC_ARM32_DIR }} --depth=1; then
          echo "Git克隆失败，切换tar.gz压缩包直下模式..."
          wget --retry-connrefused --tries=5 --waitretry=3 ${{ env.GCC_ARM32_TAR_URL }} -O gcc-arm32.tar.gz
          mkdir -p gcc-arm32-temp
          tar -zxf gcc-arm32.tar.gz -C gcc-arm32-temp --strip-components=1
          mv gcc-arm32-temp/* ${{ env.GCC_ARM32_DIR }}
          rm -rf gcc-arm32-temp gcc-arm32.tar.gz
        fi

        # 4. 验证所有工具链可用性与版本
        chmod +x ${{ env.CLANG_DIR }}/bin/* ${{ env.GCC_ARM64_DIR }}/bin/* ${{ env.GCC_ARM32_DIR }}/bin/*
        echo "===== 编译器版本验证 ====="
        ${{ env.CLANG_DIR }}/bin/clang --version | head -n 2
        ${{ env.CLANG_DIR }}/bin/ld.lld --version | head -n 1
        ${{ env.GCC_ARM64_DIR }}/bin/aarch64-linux-android-gcc --version | head -n 1
        ${{ env.GCC_ARM32_DIR }}/bin/arm-linux-androideabi-gcc --version | head -n 1

    - name: 7. 缓存内核源码
      id: kernel-source-cache
      uses: actions/cache@v4
      with:
        path: ${{ env.KERNEL_DIR }}
        key: kernel-source-${{ env.DEVICE_CODENAME }}-${{ env.KERNEL_SOURCE_BRANCH }}
        restore-keys: |
          kernel-source-${{ env.DEVICE_CODENAME }}-

    - name: 8. 拉取OnePlus7T Pro内核源码
      if: steps.kernel-source-cache.outputs.cache-hit != 'true' || inputs.clean_build == true
      run: |
        set -euo pipefail
        git clone ${{ env.KERNEL_SOURCE }} -b ${{ env.KERNEL_SOURCE_BRANCH }} ${{ env.KERNEL_DIR }} --depth=1

    - name: 9. 开启LXC/Docker支持（按需）
      if: env.ENABLE_LXC_DOCKER == 'true'
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace
        wget https://github.com/ego-taboo/LXC-DOCKER-KernelSU_Action/releases/download/2.0.0/add-lxc-docker-custom3.sh
        chmod 755 add-lxc-docker-custom3.sh
        ./add-lxc-docker-custom3.sh android-kernel/arch/arm64/configs/${{ env.KERNEL_CONFIG }}
        echo "# CONFIG_ANDROID_PARANOID_NETWORK is not set" >> android-kernel/arch/arm64/configs/${{ env.KERNEL_CONFIG }}
    

    - name: 添加runc补丁
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace
        wget https://github.com/ego-taboo/LXC-DOCKER-KernelSU_Action/releases/download/1.0.0/runcpatch.sh
        chmod a+x runcpatch.sh
        if [ -f android-kernel/kernel/cgroup.c ]; then
        ./runcpatch.sh android-kernel/kernel/cgroup.c               
        fi
        if [ -f android-kernel/kernel/cgroup/cgroup.c ]; then
        ./runcpatch.sh android-kernel/kernel/cgroup/cgroup.c               
        fi
    
   

    - name: 配置 ksu
      if: env.ENABLE_KERNELSU == 'true'
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace/android-kernel
        curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -s ${{ env.KERNELSU_TAG }}

    - name: 开启kvm
      if: env.ENABLE_KVM == 'true'
      run: |
         cd $GITHUB_WORKSPACE/kernel_workspace
         echo "CONFIG_VIRTUALIZATION=y" >> android-kernel/arch/arm64/configs/${{ env.KERNEL_CONFIG }}
         echo "CONFIG_KVM=y" >> android-kernel/arch/arm64/configs/${{ env.KERNEL_CONFIG }}
         echo "CONFIG_VHOST_NET=y" >> android-kernel/arch/arm64/configs/${{ env.KERNEL_CONFIG }}
         echo "CONFIG_VHOST_CROSS_ENDIAN_LEGACY=y" >> android-kernel/arch/arm64/configs/${{ env.KERNEL_CONFIG }}
               

    - name: 13. 高版本Clang编译适配（4.14内核）
      run: |
        set -euo pipefail
        CONFIG_FILE=${{ env.KERNEL_DIR }}/arch/arm64/configs/${{ env.KERNEL_CONFIG }}
        # 适配Clang21的栈保护配置
        sed -i "s/CONFIG_CC_STACKPROTECTOR_STRONG=y/# CONFIG_CC_STACKPROTECTOR_STRONG is not set/g" $CONFIG_FILE
        # 强制开启SMP多核与PREEMPT抢占（匹配你的内核特征）
        echo "CONFIG_SMP=y" >> $CONFIG_FILE
        echo "CONFIG_PREEMPT=y" >> $CONFIG_FILE

          # - name: 14. 配置ccache编译缓存
          # uses: hendrikmuhs/ccache-action@v1.2
          # with:
          #  key: build-kernel-${{ env.DEVICE_CODENAME }}-clang21
          #  max-size: 3G

    - name: 15. 生成内核编译配置
      run: |
        set -euo pipefail
        cd ${{ env.KERNEL_DIR }}
        # 导入工具链PATH
        export PATH="${{ env.CLANG_DIR }}/bin:${{ env.GCC_ARM64_DIR }}/bin:${{ env.GCC_ARM32_DIR }}/bin:$PATH"
        # 生成defconfig配置
        make O=out ARCH=${{ env.ARCH }} ${{ env.KERNEL_CONFIG }}

    - name: 预编译主机工具（生成内置DTC）
      run: |
          # 仅编译scripts目录，生成dtc等主机工具，不编译整个内核，速度极快
          # 必须和正式编译的ARCH/LLVM/工具链参数完全一致
    
          
    - name: 16. 执行内核编译（全LLVM工具链）
      run: |
        set -euo pipefail
        cd ${{ env.KERNEL_DIR }}
        # 全LLVM工具链环境变量（完全匹配你的编译器要求）
        export PATH="${{ env.CLANG_DIR }}/bin:${{ env.GCC_ARM64_DIR }}/bin:${{ env.GCC_ARM32_DIR }}/bin:$PATH"
        export ARCH=${{ env.ARCH }}
        export CC=clang
        export CXX=clang++
        export LD=ld.lld
        export AR=llvm-ar
        export NM=llvm-nm
        export OBJCOPY=llvm-objcopy
        export OBJDUMP=llvm-objdump
        export STRIP=llvm-strip
        export CLANG_TRIPLE=aarch64-linux-gnu-
        export CROSS_COMPILE=aarch64-linux-android-
        export CROSS_COMPILE_ARM32=arm-linux-androideabi-
        export KBUILD_BUILD_HOST=OnePlus7TPro
        export KBUILD_BUILD_USER=openela-kernel
         
         
        # 基础编译参数
        MAKE_ARGS=(
          -j$(nproc --all)
          O=out
        
          ARCH=${{ env.ARCH }}
          CONFIG_DEBUG_SECTION_MISMATCH=y
          # 全LLVM工具链强制启用
          LLVM=1
          LLVM_IAS=1
        )

        # 内核优化参数（匹配你的LTO/PGO/MLGO特征）
        if [ "${{ env.ENABLE_LTO }}" = "true" ]; then
          echo "启用Clang LTO链接时优化"
          MAKE_ARGS+=(CONFIG_LTO_CLANG=y CONFIG_THINLTO=y)
        fi
        if [ "${{ env.ENABLE_PGO }}" = "true" ] && [ -f "${{ env.PGO_PROFDATA_PATH }}" ]; then
          echo "启用PGO配置文件引导优化"
          MAKE_ARGS+=(KCFLAGS+=-fprofile-use=${{ env.PGO_PROFDATA_PATH }})
        fi
        if [ "${{ env.ENABLE_MLGO }}" = "true" ]; then
          echo "启用MLGO机器学习引导优化"
          MAKE_ARGS+=(KCFLAGS+=-mllvm -enable-mlgo=inline)
        fi

        # 执行编译，保存日志
        echo "开始编译，线程数：$(nproc --all)"
        make "${MAKE_ARGS[@]}" 2>&1 | tee out/build.log

        # 编译结果校验
        if [ ! -f out/arch/${{ env.ARCH }}/boot/${{ env.KERNEL_IMAGE_NAME }} ]; then
          echo "编译失败：未生成内核镜像，请检查日志"
          exit 1
        fi
        echo "✅ 内核编译成功，镜像已生成"

    - name: 17. 制作AnyKernel3刷入包（适配OnePlus7T Pro）
      run: |
        set -euo pipefail
        cd ${{ env.WORKSPACE }}
        # 拉取官方AnyKernel3模板，双地址兜底
        if ! git clone https://github.com/osm0sis/AnyKernel3 --depth=1; then
          echo "主地址克隆失败，切换备用gitcode镜像..."
          git clone https://gitcode.net/mirrors/osm0sis/AnyKernel3 --depth=1
        fi
        cd AnyKernel3

        # 适配OnePlus7T Pro专属配置（防刷错机型）
        sed -i "s/kernel.string=.*/kernel.string=OnePlus7TPro OpenELA Kernel | Clang21.0.0/g" anykernel.sh
        sed -i "s/do.devicecheck=0/do.devicecheck=1/g" anykernel.sh
        sed -i "s/device.name1=.*/device.name1=${{ env.DEVICE_CODENAME }}/g" anykernel.sh
        sed -i "s/device.name2=.*/device.name2=${{ env.DEVICE_NAME }}/g" anykernel.sh
        sed -i "s!BLOCK=.*!BLOCK=auto!g" anykernel.sh
        sed -i "s/IS_SLOT_DEVICE=0/IS_SLOT_DEVICE=auto/g" anykernel.sh
        sed -i "s/RAMDISK_COMPRESSION=auto/RAMDISK_COMPRESSION=auto/g" anykernel.sh

        # 复制内核镜像
        cp ${{ env.KERNEL_DIR }}/out/arch/${{ env.ARCH }}/boot/${{ env.KERNEL_IMAGE_NAME }} ./

        # 复制dtbo镜像（按需）
        if [ "${{ env.NEED_DTBO }}" = "true" ]; then
          DTBO_PATH=${{ env.KERNEL_DIR }}/out/arch/${{ env.ARCH }}/boot/dtbo.img
          if [ -f $DTBO_PATH ]; then
            echo "DTBO_EXIST=true" >> $GITHUB_ENV
            cp $DTBO_PATH ./
          fi
        fi

        # 清理无用文件，打包刷入包
        rm -rf .git* README.md
        zip -r9 ${{ env.KERNEL_ZIP_NAME }}.zip ./*

    - name: 18. 上传内核刷入包
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.KERNEL_ZIP_NAME }}
        path: ${{ env.WORKSPACE }}/AnyKernel3/${{ env.KERNEL_ZIP_NAME }}.zip
        retention-days: 90

    - name: 19. 上传DTBO镜像（按需）
      if: env.DTBO_EXIST == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: dtbo镜像
        path: ${{ env.WORKSPACE }}/AnyKernel3/dtbo.img
        retention-days: 90

    - name: 20. 上传编译日志（调试模式）
      if: inputs.debug_mode == true
      uses: actions/upload-artifact@v4
      with:
        name: 编译日志
        path: ${{ env.KERNEL_DIR }}/out/build.log
        retention-days: 30
