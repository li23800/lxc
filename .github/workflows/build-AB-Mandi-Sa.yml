name: 高端机 阿菌未霜clang18
on:
  # 支持手动触发
  workflow_dispatch:
    inputs:
      clean_build:
        description: "是否全新编译（清空所有缓存）"
        required: false
        default: false
        type: boolean
      debug_mode:
        description: "是否开启调试模式（保留完整编译日志）"
        required: false
        default: true
        type: boolean

jobs:
  build:
    name: 内核编译构建
    runs-on: ubuntu-22.04
    # 仅仓库所有者可触发
    if: github.event.repository.owner.id == github.event.sender.id
    
    steps:
    - name: 1. 拉取仓库配置
      uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: 2. 全局环境变量导入
      run: |
        set -euo pipefail
        # 一次性导入config.env中的所有配置，避免重复cat
        grep -E '^(KERNEL_SOURCE|KERNEL_SOURCE_BRANCH|KERNEL_CONFIG|KERNEL_ZIP_NAME|LLVM_CONFIG|KERNEL_IMAGE_NAME|NEED_DTBO|SWITCH_PYTHON|ENABLE_KVM|ENABLE_LXC_DOCKER|ENABLE_KERNELSU|KERNELSU_TAG)=' config.env >> $GITHUB_ENV
        # 固定编译环境配置
        echo "WORKSPACE=${{ github.workspace }}/kernel_workspace" >> $GITHUB_ENV
        echo "CLANG_DIR=${{ github.workspace }}/kernel_workspace/clang-mandi-sa" >> $GITHUB_ENV
        echo "KERNEL_DIR=${{ github.workspace }}/kernel_workspace/android-kernel" >> $GITHUB_ENV

    - name: 3. 安装编译依赖环境
      run: |
        set -euo pipefail
        # 启用universe仓库，确保ubuntu22.04可正常安装python2.7
        sudo add-apt-repository universe -y
        sudo apt-get update -y
        sudo -E apt-get -y -qq install --no-install-recommends \
          git make bc bison ccache openssl zip kmod cpio flex libelf-dev \
          curl libssl-dev libtfm-dev wget device-tree-compiler ca-certificates \
          python3 python2.7 binutils binutils-aarch64-linux-gnu binutils-arm-linux-gnueabi \
          software-properties-common
        mkdir -p ${{ env.WORKSPACE }}

    - name: 4. 切换Python2.7（按需）
      if: env.SWITCH_PYTHON == 'true'
      run: |
        set -euo pipefail
        sudo rm -f /usr/bin/python
        sudo ln -s /usr/bin/python2.7 /usr/bin/python
        python --version

    - name: 5. 缓存Clang编译器（避免重复下载）
      id: clang-cache
      uses: actions/cache@v4
      with:
        path: ${{ env.CLANG_DIR }}
        key: mandi-sa-clang18-amd64-kernel-arm
        restore-keys: |
          mandi-sa-clang18-

    - name: 6. 下载阿菌未霜Clang18编译器
      if: steps.clang-cache.outputs.cache-hit != 'true' || inputs.clean_build == true
      run: |
        set -euo pipefail
        git clone https://codeberg.org/Mandi-Sa/clang --depth=1 -b amd64-kernel-arm ${{ env.CLANG_DIR }}
        # 验证编译器可用性
        ${{ env.CLANG_DIR }}/bin/clang --version | head -n 2

    - name: 7. 缓存内核源码（加速重复编译）
      id: kernel-source-cache
      uses: actions/cache@v4
      with:
        path: ${{ env.KERNEL_DIR }}
        key: kernel-source-${{ env.KERNEL_SOURCE }}-${{ env.KERNEL_SOURCE_BRANCH }}
        restore-keys: |
          kernel-source-${{ env.KERNEL_SOURCE }}-

    - name: 8. 拉取内核源码
      if: steps.kernel-source-cache.outputs.cache-hit != 'true' || inputs.clean_build == true
      run: |
        set -euo pipefail
        git clone ${{ env.KERNEL_SOURCE }} -b ${{ env.KERNEL_SOURCE_BRANCH }} ${{ env.KERNEL_DIR }} --depth=1

    - name: 9. 开启LXC/Docker支持（按需）
      if: env.ENABLE_LXC_DOCKER == 'true'
      run: |
        set -euo pipefail
        cd ${{ env.WORKSPACE }}
        # 添加重试机制，避免网络波动导致下载失败
        wget --retry-connrefused --tries=5 --waitretry=3 \
          https://github.com/fate-think/LXC-DOCKER-KernelSU_Action/releases/download/1.0.0/add-lxc-docker-custom.sh
        chmod 755 add-lxc-docker-custom.sh
        # 执行配置修改
        ./add-lxc-docker-custom.sh ${{ env.KERNEL_DIR }}/arch/arm64/configs/${{ env.KERNEL_CONFIG }}
        echo "# CONFIG_ANDROID_PARANOID_NETWORK is not set" >> ${{ env.KERNEL_DIR }}/arch/arm64/configs/${{ env.KERNEL_CONFIG }}

    - name: 10. 添加runc补丁
      run: |
        set -euo pipefail
        cd ${{ env.WORKSPACE }}
        wget --retry-connrefused --tries=5 --waitretry=3 \
          https://github.com/fate-think/LXC-DOCKER-KernelSU_Action/releases/download/1.0.0/runcpatch.sh
        chmod a+x runcpatch.sh
        # 兼容不同内核版本的cgroup文件路径
        if [ -f ${{ env.KERNEL_DIR }}/kernel/cgroup.c ]; then
          ./runcpatch.sh ${{ env.KERNEL_DIR }}/kernel/cgroup.c
        elif [ -f ${{ env.KERNEL_DIR }}/kernel/cgroup/cgroup.c ]; then
          ./runcpatch.sh ${{ env.KERNEL_DIR }}/kernel/cgroup/cgroup.c
        else
          echo "警告：未找到cgroup文件，跳过runc补丁"
        fi

    - name: 11. Clang18编译兼容性修复
      run: |
        set -euo pipefail
        cd ${{ env.KERNEL_DIR }}
        # 修复栈保护配置适配clang18
        sed -i "s/CONFIG_CC_STACKPROTECTOR_STRONG=y/# CONFIG_CC_STACKPROTECTOR_STRONG is not set/g" arch/arm64/configs/${{ env.KERNEL_CONFIG }}
        # 下载并执行clang修复脚本
        wget --retry-connrefused --tries=5 --waitretry=3 \
          https://github.com/fate-think/LXC-DOCKER-KernelSU_Action/releases/download/v3.0.0-stable/clangfix3.sh
        chmod u+x clangfix3.sh
        ./clangfix3.sh

    - name: 12. 集成KernelSU（按需）
      if: env.ENABLE_KERNELSU == 'true'
      run: |
        set -euo pipefail
        cd ${{ env.KERNEL_DIR }}
        # 添加curl重试，避免网络问题
        curl -LSs --retry 5 --retry-delay 3 \
          "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -s ${{ env.KERNELSU_TAG }}

    - name: 13. 开启KVM虚拟化支持（按需）
      if: env.ENABLE_KVM == 'true'
      run: |
        set -euo pipefail
        CONFIG_FILE=${{ env.KERNEL_DIR }}/arch/arm64/configs/${{ env.KERNEL_CONFIG }}
        echo "CONFIG_VIRTUALIZATION=y" >> $CONFIG_FILE
        echo "CONFIG_KVM=y" >> $CONFIG_FILE
        echo "CONFIG_VHOST_NET=y" >> $CONFIG_FILE
        echo "CONFIG_VHOST_CROSS_ENDIAN_LEGACY=y" >> $CONFIG_FILE

    - name: 14. 配置ccache编译缓存
      uses: hendrikmuhs/ccache-action@v1.2
      with:
        key: build-kernel-${{ env.KERNEL_CONFIG }}-clang18
        max-size: 3G

    - name: 15. 内核编译配置生成
      run: |
        set -euo pipefail
        cd ${{ env.KERNEL_DIR }}
        # 导入工具链PATH
        export PATH="${{ env.CLANG_DIR }}/bin:$PATH"
        # 生成编译配置
        make O=out ARCH=arm64 ${{ env.KERNEL_CONFIG }}

    - name: 16. 执行内核编译
      run: |
        set -euo pipefail
        cd ${{ env.KERNEL_DIR }}
        # 环境变量配置
        export PATH="${{ env.CLANG_DIR }}/bin:$PATH"
        export KBUILD_BUILD_HOST=高端机
        export KBUILD_BUILD_USER=阿菌未霜
        export ARCH=arm64
        export CLANG_TRIPLE=aarch64-linux-gnu-
        export CROSS_COMPILE=aarch64-linux-gnu-
        export CROSS_COMPILE_ARM32=arm-linux-gnueabi-
        export CC="ccache clang"
        export CXX="ccache clang++"

        # 基础编译参数
        BASE_MAKE_ARGS=(
          -j$(nproc --all)
          O=out
          ARCH=arm64
          CONFIG_DEBUG_SECTION_MISMATCH=y
          CLANG_TRIPLE=$CLANG_TRIPLE
          CROSS_COMPILE=$CROSS_COMPILE
          CROSS_COMPILE_ARM32=$CROSS_COMPILE_ARM32
          CC=$CC
          CXX=$CXX
        )

        # LLVM全工具链编译适配
        if [ "${{ env.LLVM_CONFIG }}" = "y" ]; then
          echo "启用LLVM全工具链编译"
          make "${BASE_MAKE_ARGS[@]}" LLVM=1 LLVM_IAS=1 2>&1 | tee out/build.log
        else
          echo "启用混合工具链编译"
          make "${BASE_MAKE_ARGS[@]}" 2>&1 | tee out/build.log
        fi

        # 验证内核镜像是否生成成功
        if [ ! -f out/arch/arm64/boot/${{ env.KERNEL_IMAGE_NAME }} ]; then
          echo "编译失败：未生成内核镜像文件"
          exit 1
        fi
        echo "编译成功，内核镜像已生成"

    - name: 17. 准备AnyKernel3刷入包
      run: |
        set -euo pipefail
        cd ${{ env.WORKSPACE }}
        # 拉取AnyKernel3官方模板
        git clone https://github.com/osm0sis/AnyKernel3 --depth=1
        cd AnyKernel3

        # 适配刷入配置（完全匹配官方规范）
        sed -i "s/kernel.string=.*/kernel.string=高端机内核 阿菌未霜clang18/g" anykernel.sh
        sed -i "s/do.devicecheck=1/do.devicecheck=0/g" anykernel.sh
        sed -i "s!BLOCK=.*!BLOCK=auto!g" anykernel.sh
        sed -i "s/IS_SLOT_DEVICE=0/IS_SLOT_DEVICE=auto/g" anykernel.sh
        sed -i "s/RAMDISK_COMPRESSION=auto/RAMDISK_COMPRESSION=auto/g" anykernel.sh

        # 复制内核镜像
        cp ${{ env.KERNEL_DIR }}/out/arch/arm64/boot/${{ env.KERNEL_IMAGE_NAME }} ./

        # 复制dtbo镜像（按需）
        if [ "${{ env.NEED_DTBO }}" = "true" ]; then
          DTBO_PATH=${{ env.KERNEL_DIR }}/out/arch/arm64/boot/dtbo.img
          if [ -f $DTBO_PATH ]; then
            echo "DTBO_EXIST=true" >> $GITHUB_ENV
            cp $DTBO_PATH ./
          fi
        fi

        # 清理无用文件，减小包体积
        rm -rf .git* README.md ramdisk modules patch

        # 打包成recovery可直接刷入的zip包
        zip -r9 ${{ env.KERNEL_ZIP_NAME }}.zip ./*

    - name: 18. 上传内核刷入包
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.KERNEL_ZIP_NAME }}
        path: ${{ env.WORKSPACE }}/AnyKernel3/${{ env.KERNEL_ZIP_NAME }}.zip
        retention-days: 90

    - name: 19. 上传DTBO镜像（按需）
      if: env.DTBO_EXIST == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: dtbo镜像
        path: ${{ env.WORKSPACE }}/AnyKernel3/dtbo.img
        retention-days: 90

    - name: 20. 上传编译日志（调试模式）
      if: inputs.debug_mode == true
      uses: actions/upload-artifact@v4
      with:
        name: 编译日志
        path: ${{ env.KERNEL_DIR }}/out/build.log
        retention-days: 30
